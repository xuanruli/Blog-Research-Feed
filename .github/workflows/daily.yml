name: daily-ai-news

on:
  schedule:
    - cron: "0 9 * * *"  # 09:00 UTC = 17:00 Beijing / 01:00 PT
  workflow_dispatch:

concurrency:
  group: daily-ai-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install orchestrator deps
        # Runner only needs the Anthropic SDK + PyYAML to call sessions/files
        # API and resolve agent/env by name. brf is NOT needed on the runner —
        # it runs inside the Managed Agents container.
        run: pip install anthropic pyyaml

      - name: Run daily curator
        env:
          # The runner only calls the Anthropic API. All third-party secrets
          # live in a pre-uploaded Files API object (see scripts/upload_env.py)
          # whose id is stored as the ENV_FILE_ID repository variable.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENV_FILE_ID: ${{ vars.ENV_FILE_ID }}
        run: python -m orchestrator.daily

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daily-failure-logs
          path: |
            *.log
          retention-days: 7
