# brf/sources.yaml — single source of truth for all source types.
#
# Replaces sources.opml + SKIP_FEEDS/SUMMARY_ONLY_FEEDS/FIRECRAWL_FALLBACK_FEEDS
# constants in brf/rss.py. Loader: brf/sources_config.py.
#
# Conventions:
#   - `enabled: false` + `reason: "..."` for known-broken sources we keep
#     listed for visibility (replaces SKIP_FEEDS).
#   - `summary_only: true` for feeds whose RSS only ships titles/short
#     blurbs (replaces SUMMARY_ONLY_FEEDS).
#   - firecrawl_index entries describe how to scrape index pages for
#     no-feed sites and broken-RSS-but-live-HTML sites.

