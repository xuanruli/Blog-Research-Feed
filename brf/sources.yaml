firecrawl_index:
  # Entries already proven in FIRECRAWL_FALLBACK_FEEDS (brf/rss.py).
  - name: "机器之心"
    url: "https://www.jiqizhixin.com"
    article_url_regex: 'https?://www\.jiqizhixin\.com/articles/(\d{4}-\d{2}-\d{2})-\d+'
    date_format: "%Y-%m-%d"
    date_group: 1
  - name: "HF Daily Papers"
    url: "https://huggingface.co/papers"
    article_url_regex: 'https?://huggingface\.co/papers/\d{4}\.\d{4,5}'
    date_format: null
    date_group: null
  - name: "LangChain Blog"
    url: "https://blog.langchain.com"
    # Negative lookahead drops category/tag/author/page indices.
    article_url_regex: 'https?://blog\.langchain\.(?:com|dev)/(?!category/|tag/|author/|page/|rss/?$)([a-z0-9]+(?:-[a-z0-9]+)+)/?(?:\?.*)?$'
    date_format: null
    date_group: null

