name: blog-research-feed-env-v7  # v7: brf 0.1.4 — config.py auto-loads /mnt/session/uploads/workspace/.env (Managed Agents mount prefix). v6 shipped FIRECRAWL_FALLBACK_FEEDS / YouTube Whisper / Matt Pocock.
config:
  type: cloud

  networking:
    # Agent fetches Firecrawl/X/OpenAI/Slack/RSS sources, so unrestricted.
    # Could tighten via package_managers_and_custom + allowed_hosts later.
    type: unrestricted

  packages:
    apt:
      # ffmpeg: youtube-transcript-api fallback + podcast audio pipeline.
      - ffmpeg
      # jq: agent uses it in bash pipelines (`brf fetch-all` → jq on index.json).
      - jq
    pip:
      # Pin setuptools<72 first — defensive in case any wheel needs a
      # legacy-setuptools build env. (As of brf 0.1.1 this is mostly
      # unnecessary because we dropped feedparser → no sgmllib3k.)
      - "setuptools<72"
      - "wheel"
      # Install brf from PyPI. Published from this repo via
      # `python -m build && twine upload dist/*`.
      #
      # v0.1.1 changes: dropped feedparser dep, replaced with stdlib
      # xml.etree-based RSS/Atom parser in brf/rss.py. Reason:
      # feedparser's transitive sgmllib3k is sdist-only and fails to
      # build in Anthropic's env-build pip-with-isolation (silent
      # failure, no logs). brf 0.1.0 install crashed at sgmllib3k step;
      # 0.1.1 installs cleanly because every dep is wheel-available.
      #
      # To deploy a new brf version:
      #   1. bump `version` in pyproject.toml
      #   2. `python -m build && twine upload dist/*`
      #   3. bump the pin below to the new version
      #   4. bump this env's `name:` (v4 → v5) and re-run scripts/create_agent.py
      #   5. cron runner picks up the new env by name on next cron run
      - "blog-research-feed==0.1.4"
