name: blog-research-feed-env-v3  # v3: install brf from PyPI (git URL silently failed in v2)
config:
  type: cloud

  networking:
    # Agent fetches Firecrawl/X/OpenAI/Slack/RSS sources, so unrestricted.
    # Could tighten via package_managers_and_custom + allowed_hosts later.
    type: unrestricted

  packages:
    apt:
      # ffmpeg: youtube-transcript-api fallback + podcast audio pipeline.
      - ffmpeg
      # jq: agent uses it in bash pipelines (`brf fetch rss | jq ...`).
      - jq
    pip:
      # Pin setuptools<72 first — feedparser's transitive dep sgmllib3k
      # won't build with newer setuptools. (Even though brf is now installed
      # as a wheel from PyPI, sgmllib3k is still sdist-only and gets built
      # at install time.)
      - "setuptools<72"
      - "wheel"
      # Install brf from PyPI. Published from this repo via
      # `python -m build && twine upload dist/*`.
      #
      # Switched from `git+https://github.com/.../blog-research-feed.git@main`
      # because the git URL install silently failed in v1/v2 envs (env-build
      # logs not exposed by Anthropic, so we couldn't debug).
      #
      # To deploy a new brf version:
      #   1. bump `version` in pyproject.toml
      #   2. `python -m build && twine upload dist/*`
      #   3. bump the pin below to the new version
      #   4. bump this env's `name:` (v3 → v4) and re-run scripts/create_agent.py
      #   5. orchestrator picks up the new env by name on next cron run
      - "blog-research-feed==0.1.0"
